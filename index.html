<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アメフト プレイブック プロ (Ultimate Edition)</title>
    <style>
        :root {
            --field-color: #81c784; --line-color: #ffffff;
            --offense-color: #1565c0; --defense-color: #000000;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        #alert-panel { display: none; background-color: #d32f2f; color: white; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; text-align: center; animation: blink 1.5s infinite; }
        #info-panel { background-color: #e8f5e9; color: #2e7d32; padding: 8px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; font-weight: bold; text-align: center; border: 1px solid #c8e6c9; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.8;} 100% {opacity: 1;} }

        .save-load-area { background-color: #e3f2fd; padding: 15px; border-radius: 6px; margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; border: 1px solid #90caf9; }
        .save-load-area select { padding: 8px; flex: 1; min-width: 200px; border-radius: 4px; border: 1px solid #ccc; }

        .header { display: flex; gap: 15px; margin-bottom: 20px; }
        .header input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 4px; }
        .tool-group { display: flex; gap: 4px; border-right: 2px solid #ddd; padding-right: 8px; margin-right: 8px; }
        
        button { padding: 8px 12px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; cursor: pointer; font-weight: bold; }
        button.active { background-color: #4caf50; color: white; border-color: #4caf50; }
        .btn-action { background-color: #607d8b; color: white; border: none; }
        .btn-primary { background-color: #1976d2; color: white; border: none; }
        .btn-flip { background-color: #ff9800; color: white; border: none; }
        .print-btn { background-color: #d32f2f; color: white; margin-left: auto; border: none; }
        
        .field-container { position: relative; width: 100%; height: 450px; background-color: var(--field-color); border: 2px solid var(--line-color); border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        .yard-line { position: absolute; width: 100%; border-top: 2px dashed rgba(255, 255, 255, 0.5); display: flex; justify-content: space-between; align-items: center; z-index: 5; pointer-events: none; }
        .yard-line.los { border-top: 3px solid #1976d2; }
        .yard-label { background: var(--field-color); color: rgba(255, 255, 255, 0.9); padding: 0 10px; font-size: 14px; font-weight: bold; transform: translateY(-50%); }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #drawing-canvas { z-index: 10; }
        #temp-canvas { z-index: 11; pointer-events: none; }
        #field-players { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        
        .player { position: absolute; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; user-select: none; cursor: grab; border: 2px solid #fff; transform: translate(-50%, -50%); pointer-events: auto; }
        .player.offense { background-color: var(--offense-color); color: white; }
        .player.defense { background-color: transparent; color: var(--defense-color); border: 2px solid var(--defense-color); font-size: 18px; }
        .player.eligible { border: 3px solid #ffeb3b !important; box-shadow: 0 0 8px #ffeb3b; }

        .assignments { display: flex; flex-direction: column; gap: 10px; }
        .assignment-box { display: flex; flex-direction: row; align-items: flex-start; background: #fafafa; padding: 12px; border-radius: 6px; border: 1px solid #ddd; gap: 12px; }
        .assignment-label-area { width: 100px; flex-shrink: 0; }
        .assignment-box textarea { flex-grow: 1; height: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }

        @media print {
            .toolbar, .save-load-area, #alert-panel, #info-panel { display: none !important; }
            .container { box-shadow: none; padding: 0; }
            .assignment-box { break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="alert-panel">⚠️ イリーガル・フォーメーション: LOS上には最低7人必要です！</div>
    <div id="info-panel">💡 【ルール】黄色の枠線の選手が有資格レシーバーです。</div>

    <div class="save-load-area">
        <button class="btn-primary" onclick="savePlayData()">保存</button>
        <select id="saved-plays-dropdown"><option value="">-- ロード --</option></select>
        <button onclick="loadPlayData()">読込</button>
        <button onclick="deletePlayData()" style="background-color: #ef5350; color: white;">削除</button>
        <button onclick="exportPlayData()" class="btn-action">📤 共有コードをコピー</button>
        <button onclick="importPlayData()" class="btn-action" style="background-color: #607d8b;">📥 コードを読込</button>
    </div>
    
    <div class="header">
        <input type="text" id="formation-name" placeholder="隊形名">
        <input type="text" id="play-name" placeholder="サイン名">
    </div>

    <div class="toolbar">
        <div class="tool-group">
            <button id="btn-move" class="active" onclick="setMode('move')">移動</button>
        </div>
        <div class="tool-group">
            <button id="btn-draw-free" onclick="setMode('draw-free')">自由描画</button>
            <button id="btn-draw-line" onclick="setMode('draw-line')">直線</button>
            <button id="btn-erase" onclick="setMode('erase')">消しゴム</button>
        </div>
        <div class="tool-group">
            <button id="btn-style-solid" class="active" onclick="setLineStyle('solid')">実線</button>
            <button id="btn-style-dashed" onclick="setLineStyle('dashed')">点線</button>
        </div>
        <div class="tool-group">
            <button onclick="undo()">一つ戻す</button>
            <button onclick="clearCanvas()">全消去</button>
            <button class="btn-flip" onclick="flipFormation()">左右反転(Flip)</button>
        </div>
        <button class="btn-action" style="background-color: #ffb74d; color: #333;" onclick="addDefense()">+ 敵追加</button>
        <button class="print-btn" onclick="window.print()">PDF保存</button>
    </div>

    <div class="field-container" id="field">
        <div class="yard-line" style="top: 10%;"><span class="yard-label">15</span><span class="yard-label">15</span></div>
        <div class="yard-line" style="top: 30%;"><span class="yard-label">10</span><span class="yard-label">10</span></div>
        <div class="yard-line" style="top: 50%;"><span class="yard-label">5</span><span class="yard-label">5</span></div>
        <div class="yard-line los" style="top: 70%;" id="los-line"><span class="yard-label">LOS</span><span class="yard-label">LOS</span></div>
        <div class="yard-line" style="top: 90%;"><span class="yard-label">-5</span><span class="yard-label">-5</span></div>

        <canvas id="drawing-canvas"></canvas>
        <canvas id="temp-canvas"></canvas>
        <div id="field-players"></div>
    </div>

    <div class="assignments" id="assignments-container"></div>
</div>

<script>
    // タイトなOLスプリット幅に修正
    const offenseInitialData = [
        { id: 'o1', name: 'C', x: 50, y: 70 }, 
        { id: 'o2', name: 'LG', x: 46, y: 70 }, { id: 'o3', name: 'RG', x: 54, y: 70 },
        { id: 'o4', name: 'LT', x: 42, y: 70 }, { id: 'o5', name: 'RT', x: 58, y: 70 }, 
        { id: 'o6', name: 'QB', x: 50, y: 78 }, { id: 'o7', name: 'RB', x: 50, y: 88 }, 
        { id: 'o8', name: 'Y', x: 62, y: 75 }, { id: 'o9', name: 'X', x: 15, y: 70 }, 
        { id: 'o10', name: 'Z', x: 85, y: 70 }, { id: 'o11', name: 'H', x: 25, y: 75 }
    ];

    let currentMode = 'move';
    let lineStyle = 'solid';
    let isDrawing = false;
    let startX, startY;
    let paths = [];
    
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    const tempCanvas = document.getElementById('temp-canvas');
    const tCtx = tempCanvas.getContext('2d');
    const field = document.getElementById('field');

    function resizeCanvas() {
        [canvas, tempCanvas].forEach(c => {
            c.width = field.clientWidth;
            c.height = field.clientHeight;
        });
        redrawAll();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function checkFormation() {
        const players = Array.from(document.querySelectorAll('.player.offense'));
        const losTop = field.clientHeight * 0.7;
        let losPlayers = [];
        let backfieldPlayers = [];

        players.forEach(p => {
            const rect = p.getBoundingClientRect();
            const fRect = field.getBoundingClientRect();
            const pY = (rect.top + rect.height/2) - fRect.top;
            if (pY > losTop + 15) backfieldPlayers.push(p);
            else losPlayers.push({ el: p, x: parseFloat(p.style.left) });
        });

        document.getElementById('alert-panel').style.display = (losPlayers.length < 7) ? 'block' : 'none';
        players.forEach(p => p.classList.remove('eligible'));
        backfieldPlayers.forEach(p => p.classList.add('eligible'));
        if (losPlayers.length > 0) {
            losPlayers.sort((a, b) => a.x - b.x);
            losPlayers[0].el.classList.add('eligible');
            if (losPlayers.length > 1) losPlayers[losPlayers.length - 1].el.classList.add('eligible');
        }
    }

    function flipFormation() {
        document.querySelectorAll('.player').forEach(p => p.style.left = `${100 - parseFloat(p.style.left)}%`);
        paths.forEach(p => p.points.forEach(pt => pt.x = canvas.width - pt.x));
        redrawAll(); checkFormation();
    }

    function createPlayerElement(id, name, x, y, type) {
        const div = document.createElement('div');
        div.className = `player ${type}`; div.id = `node-${id}`; div.innerText = type === 'defense' ? '×' : name;
        div.style.left = typeof x === 'number' ? `${x}%` : x;
        div.style.top = typeof y === 'number' ? `${y}%` : y;
        div.addEventListener('mousedown', startDrag);
        div.addEventListener('touchstart', startDrag, {passive: false});
        if (type === 'defense') div.addEventListener('dblclick', () => { div.remove(); checkFormation(); });
        document.getElementById('field-players').appendChild(div);
    }

    // --- 描画ロジック ---
    function setMode(mode) {
        currentMode = mode;
        ['btn-move', 'btn-draw-free', 'btn-draw-line', 'btn-erase'].forEach(id => document.getElementById(id).classList.toggle('active', id === `btn-${mode}`));
        canvas.style.pointerEvents = (mode === 'move') ? 'none' : 'auto';
    }

    function setLineStyle(style) {
        lineStyle = style;
        document.getElementById('btn-style-solid').classList.toggle('active', style === 'solid');
        document.getElementById('btn-style-dashed').classList.toggle('active', style === 'dashed');
    }

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx - r.left, y: cy - r.top };
    }

    field.addEventListener('mousedown', (e) => {
        if (currentMode === 'move') return;
        isDrawing = true;
        const pos = getPos(e);
        startX = pos.x; startY = pos.y;
        if (currentMode !== 'draw-line') paths.push({ mode: currentMode, style: lineStyle, points: [pos] });
    });

    field.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const pos = getPos(e);
        if (currentMode === 'draw-free' || currentMode === 'erase') {
            paths[paths.length - 1].points.push(pos);
            redrawAll();
        } else if (currentMode === 'draw-line') {
            tCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
            drawSinglePath(tCtx, { mode: 'draw-line', style: lineStyle, points: [{x: startX, y: startY}, pos] });
        }
    });

    window.addEventListener('mouseup', (e) => {
        if (!isDrawing) return;
        if (currentMode === 'draw-line') {
            paths.push({ mode: 'draw-line', style: lineStyle, points: [{x: startX, y: startY}, getPos(e)] });
            tCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
        }
        isDrawing = false; redrawAll();
    });

    function drawSinglePath(t, p) {
        t.beginPath(); t.lineWidth = p.mode === 'erase' ? 20 : 3; t.lineCap = 'round'; t.lineJoin = 'round';
        if (p.mode === 'erase') { t.globalCompositeOperation = 'destination-out'; t.strokeStyle = 'rgba(0,0,0,1)'; }
        else { t.globalCompositeOperation = 'source-over'; t.strokeStyle = '#ffff00'; t.setLineDash(p.style === 'dashed' ? [10, 10] : []); }
        if (p.points.length < 2) return;
        t.moveTo(p.points[0].x, p.points[0].y);
        for (let i = 1; i < p.points.length; i++) t.lineTo(p.points[i].x, p.points[i].y);
        t.stroke();
    }

    function redrawAll() { ctx.clearRect(0, 0, canvas.width, canvas.height); paths.forEach(p => drawSinglePath(ctx, p)); }
    function undo() { paths.pop(); redrawAll(); }
    function clearCanvas() { if(confirm("描いた線をすべて消しますか？")) { paths = []; redrawAll(); } }

    // --- ドラッグ ---
    let dragged = null, ox, oy;
    function startDrag(e) {
        if (currentMode !== 'move') return;
        dragged = e.target; const rect = dragged.getBoundingClientRect();
        ox = (e.touches ? e.touches[0].clientX : e.clientX) - (rect.left + rect.width/2);
        oy = (e.touches ? e.touches[0].clientY : e.clientY) - (rect.top + rect.height/2);
    }
    document.addEventListener('mousemove', (e) => {
        if (!dragged) return;
        const r = field.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        dragged.style.left = `${Math.max(0, Math.min(100, (cx - r.left - ox) / r.width * 100))}%`;
        dragged.style.top = `${Math.max(0, Math.min(100, (cy - r.top - oy) / r.height * 100))}%`;
        checkFormation();
    });
    document.addEventListener('mouseup', () => dragged = null);

    // --- セーブ / ロード ---
    function savePlayData() {
        const name = document.getElementById('play-name').value || '無題';
        const data = { 
            f: document.getElementById('formation-name').value, n: name,
            o: Array.from(document.querySelectorAll('.player.offense')).map(el => ({id: el.id, x: el.style.left, y: el.style.top, n: el.innerText})),
            d: Array.from(document.querySelectorAll('.player.defense')).map(el => ({x: el.style.left, y: el.style.top})),
            p: paths,
            t: Array.from(document.querySelectorAll('.assignment-text')).map(el => el.value),
            pn: Array.from(document.querySelectorAll('.pos-input')).map(el => el.value)
        };
        const saves = JSON.parse(localStorage.getItem('playbook_v3') || '{}');
        saves[name] = data;
        localStorage.setItem('playbook_v3', JSON.stringify(saves));
        updateDropdown(); alert('保存しました');
    }

    function loadPlayData() {
        const name = document.getElementById('saved-plays-dropdown').value;
        const d = JSON.parse(localStorage.getItem('playbook_v3') || '{}')[name];
        if (!d) return;
        document.getElementById('field-players').innerHTML = '';
        document.getElementById('assignments-container').innerHTML = '';
        d.o.forEach((p, i) => {
            createPlayerElement(p.id.replace('node-',''), p.n, p.x, p.y, 'offense');
            addAssignmentBox(p.id.replace('node-',''), d.pn[i], d.t[i]);
        });
        d.d.forEach(p => createPlayerElement(`d${Math.random()}`, '×', p.x, p.y, 'defense'));
        paths = d.p; document.getElementById('formation-name').value = d.f; document.getElementById('play-name').value = d.n;
        redrawAll(); checkFormation();
    }

    function deletePlayData() {
        const name = document.getElementById('saved-plays-dropdown').value;
        if (!name || !confirm(`「${name}」を削除しますか？`)) return;
        const saves = JSON.parse(localStorage.getItem('playbook_v3') || '{}');
        delete saves[name]; localStorage.setItem('playbook_v3', JSON.stringify(saves));
        updateDropdown();
    }

    function updateDropdown() {
        const ds = JSON.parse(localStorage.getItem('playbook_v3') || '{}');
        const sel = document.getElementById('saved-plays-dropdown');
        sel.innerHTML = '<option value="">-- ロード --</option>';
        Object.keys(ds).forEach(k => sel.innerHTML += `<option value="${k}">${k}</option>`);
    }

    function exportPlayData() {
        const data = { f: document.getElementById('formation-name').value, n: document.getElementById('play-name').value, o: Array.from(document.querySelectorAll('.player.offense')).map(el => ({x: el.style.left, y: el.style.top, n: el.innerText})), d: Array.from(document.querySelectorAll('.player.defense')).map(el => ({x: el.style.left, y: el.style.top})), p: paths, t: Array.from(document.querySelectorAll('.assignment-text')).map(el => el.value) };
        navigator.clipboard.writeText(JSON.stringify(data)).then(() => alert("共有コードをコピーしました"));
    }

    function importPlayData() {
        const code = prompt("共有コードを貼り付けてください");
        if (!code) return;
        const d = JSON.parse(code);
        document.getElementById('field-players').innerHTML = '';
        document.getElementById('assignments-container').innerHTML = '';
        d.o.forEach((p, i) => { createPlayerElement(`o${i}`, p.n, p.x, p.y, 'offense'); addAssignmentBox(`o${i}`, p.n, d.t[i]); });
        d.d.forEach(p => createPlayerElement(`d${Math.random()}`, '×', p.x, p.y, 'defense'));
        paths = d.p; redrawAll(); checkFormation();
    }

    function addAssignmentBox(id, name, text = "") {
        const box = document.createElement('div'); box.className = 'assignment-box';
        box.innerHTML = `<div class="assignment-label-area"><b>${name}</b><br><input type="text" value="${name}" data-target="${id}" style="width:50px" class="pos-input"></div><textarea class="assignment-text" placeholder="役割...">${text}</textarea>`;
        document.getElementById('assignments-container').appendChild(box);
    }

    function addDefense() { createPlayerElement(`d${Date.now()}`, '×', 50, 40, 'defense'); checkFormation(); }

    // 初期化
    offenseInitialData.forEach(p => {
        createPlayerElement(p.id, p.name, p.x, p.y, 'offense');
        addAssignmentBox(p.id, p.name);
    });
    document.getElementById('assignments-container').addEventListener('input', (e) => {
        if (e.target.classList.contains('pos-input')) {
            const node = document.getElementById(`node-${e.target.dataset.target}`);
            if (node) node.innerText = e.target.value;
        }
    });
    updateDropdown(); setTimeout(checkFormation, 100);
</script>
</body>
</html>
